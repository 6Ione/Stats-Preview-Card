<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Stats preview card component</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    body {
      background-color: hsl(233, 47%, 7%);
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      display: flex;
      overflow: hidden;
    }
  
    .cardContent {
      background-color: hsl(244, 37%, 16%);
      color: hsl(0, 0%, 100%);
      width: 500px;
      padding: 4rem;
      border-radius: 8px 0 0 8px;
    }

    .cardSection {
      max-width: 380px;
      text-align: left;
    }
    .cardSection h1 {
      margin-bottom: 1.5rem;
      line-height: 1.2;
      font-size: 2.4rem;
    }
    .cardSection p {
      color: hsla(0, 0%, 100%, 0.6);
      line-height: 1.6rem;
      font-weight: 300;
    }
    .cardSection span {
      color: hsl(277, 64%, 61%);
    }

    .cardStats {
      display: flex;
      gap: 3rem;
      margin-top: 3rem;
      text-align: left;
    }
    .cardStats p {
      color: hsla(0, 0%, 100%, 0.6);
      margin-top: -10px;
      font-weight: 300;
    }
    .cardImage {
      background: hsl(277, 64%, 61%);
      border-radius: 0 8px 8px 0;
    }
    .cardImage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;

      mix-blend-mode: multiply;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .container {
        padding: 1.5rem;
      }

      .card {
        flex-direction: column-reverse;
        max-width: 100%;
      }

      .cardContent {
        width: auto;
        padding: 2rem;
        text-align: center;
      }

      .cardSection {
        max-width: 100%;
        text-align: center;
      }

      .cardSection h1 {
        font-size: 1.8rem;
      }

      .cardSection p {
        font-size: 0.95rem;
        line-height: 1.7;
      }

      .cardImage {
        width: 100%;
        height: 250px;
      }

      .cardImage img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .cardStats {
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        margin-top: 2rem;
        text-align: center;
      }

      .cardStats h2 {
        margin-bottom: 0.3rem;
      }

      .cardStats p {
        margin-top: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <div class="card">
        <div class="cardContent">

          <div class="cardSection">
            <h1>Get <span>insights</span> that help your business grow.</h1>
            <p>Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.</p>
          </div>

          <div class="cardStats">
            <div>
              <h2>10k+</h2>
              <p>COMPANIES</p>
            </div>

            <div>
              <h2>314</h2>
              <p>TEMPLATES</p>
            </div>

            <div>
              <h2>12M+</h2>
              <p>QUERIES</p>
            </div>
          </div>

        </div>

        <div class="cardImage">
          <img src="./images/image-header-desktop.jpg" alt="desktop image">
        </div>
      </div>
    </div>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Capo</a>.
  </footer>
</body>
</html>
